---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: "Difficulty: [c][ff00ff][b]Ultra[/b][-][/c]\n[c][ff00ff][b]VR Planet Nyxara[/b][-][/c]"

PlanetClass: Dark Rogue Starter
PlanetType: Nyxara
Emissive: True
PlayfieldType: Planet
UseFixed: True
UseRandom: False
Difficulty: 7

# Blueprint factory is disabled on this starting planet.
AllowBlueprintSV: False
AllowBlueprintCV: False
AllowBlueprintBA: False
AllowBlueprintHV: False
Instance:
   Time: 60
   MaxPlayers: 2
   PortalOpen: 60
   Cooldown: 240
   AllowBlueprints: False
LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.1, 0, 0" 
SkyColor: "0,0,0"
AtmosphereParams: [10, 3]          # [Rayleigh Multiplier, Atmosphere Contrast], default is AtmosphereParams: [1, 1.6]   
                                     # RayleighMultiplier between 0 and 10 - higher values make SkyColor / SkyHorizonColor more pronounced
                                     # Atmosphere Contrast between 0 and 3 - lower values wash out SkyColor / SkyHorizonColor 

# Light
DayLightIntensity: 0.05
NightLightIntensity: 0.05
DayShadowStrength: 0.95

LightZenithColor: "0.01,0.01,0.01"
LightHorizonColor: "0.05,0,0"
NightLightColor: "0.1, 0, 0"

# Sun
SunFlare: EnvironmentalEffects/SunFlareRed
OrbitUsesLightColor: True

# Fog
FogColor: "0, 0, 0"
FogCloudIntensity: 0.8
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.4
# GroundFogHeight: 800

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 0
CloudsBrightness: 0
CloudsOpacity: 0.5
CloudsZenithColor: "0.03,0,0"
CloudsHorizonColor: "0.03,0.03,0"
CloudsNightZenithColor: "0, 0, 0.03"
CloudsNightHorizonColor: "0.02, 0.01, 0.02"

WindSpeed: 0

# Sky variation 4 ========================================================================================================


# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

  - Name: SnowLight
    # Biome: [ Crashsite, Grassland, ColdPlains ]
    Time: Night
    MaxHeight: 800

SpecialEffectsGlobal:
# Weather

  - Name: Fog
    Type: Weather
    InitialDelay: 0
    Delay: 0
    Lifetime: 2400



# Global Effect
  - Name: MeteorShower
    Time: Day
    InitialDelay: 0
    Delay: 2
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid

  - Name: ThunderAndLightningRed
    Time: Always
    InitialDelay: 6
    Delay: 6
    Lifetime: 180
    PlyDist: 50
    SpawnY: 100
    Struct: Avoid    

