SpawnZones:

   - SpawnAt: [IronResource, SiliconResource, CopperResource, PromethiumResource]
     BiomesExcluded: [ LowMountains, Mountains ]
     Radius: 1000
     RadiusRandom: 200
     RateMultiplyerCenter: 1.0
     RateMultiplyerEdge: 0.1
     Color: "1.0, 1.0, 1.0, 1.0" 
     Entities:
       - Names: [Eden_ZiraxPatrolSniper, Eden_ZiraxRipperDogPatrolMinigun]
         Biomes: [Any]
         Amount: 75
         Period: Always
         DelayMinMax: [-1, -1]


