### Resource Deposits
RandomResources:

    - Name: IronResource    # may confuse players- Iron is literally in the canyon walls! (and more challenging to harvest than standard deposits)
      Biome: [ DustBowl, Rifts, Rifts_1, LargeCrater, SmallCrater, Dunes ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 1
      MaxDroneCount: 1
      #DistTypeCylinder
        #MaxRadius 18
        #YVariance 5

    - Name: CopperResource
      Biome: [ ShallowCanyon, Canyon, DeepCanyon ]
      IsScalingCount: True 
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 1
      MaxDroneCount: 2
      #DistTypeCylinder
        #MaxRadius 24
        #YVariance 5
        
    - Name: SiliconResource
      Biome: [ ShallowCanyon, Canyon, DeepCanyon ]
      IsScalingCount: True 
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 1
      MaxDroneCount: 2
      #DistTypeCylinder
        #MaxRadius 24
        #YVariance 5
        
    - Name: PromethiumResource
      Biome: [ Rocks, Rocks_1, LavaFolds, LavaEdge, ShallowCanyon, Canyon, DeepCanyon ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DroneProb: 1
      MaxDroneCount: 4
      DepthMinMax: [ 5, 10 ]
      #DistTypeCylinder
        #MaxRadius 24
        #YVariance 10



### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.1
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.1
     - Name: CopperResource
       Threshold: 0.2
       Amount: 0.1
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.1

### POIs
POIs:
    Random:

    Fixed:
        - Type: BA_Alien
          Faction: Alien             
          NoShieldReload: True
          Prefab: ARC_HALLOFCHAMPIONS  # <= (Use the blueprint save name to spawn it!)
          Mode: Survival
          Name: Hall of Champions
          Pos: [ 352.6, 172.2, 1558.0 ]      # (Centered on the 'maw' of the stamp, no matter its rotation.)
          InitPower: True
          Properties: 
            - Key: Music
              Value: DarkSoundscape
            - Key: SI
              Value: Off
    FixedPlayerStart:
        - Mode: Debug
          Pos: [ 0, 120, 0 ]
          RotY: 0

        # - Mode: Survival
          # Spawn: EscapePod
          # Armor: ArmorMedium
          

        - Mode: Survival
          Spawn: Structure
          Structure: "Eden_StarterRogue"
          # Armor: ArmorLight
          PlayerArmor: ["None, None, None, #FreshStart:None"]     
          Status: [ "Food: 500, Health: 500", "Food: 450, Health: 450", "Food: 400, Health: 400", "#FreshStart:Food: 250, Health: 300" ]      # NEW
          Items: [ 
          "Token:1:6999, Token:1:6998, WaterBottle:3, PowerBar:3",
          "Token:1:6999, Token:1:6998, WaterBottle:2, PowerBar:2",
          "Token:1:6999, Token:1:6998, WaterBottle:1, PowerBar:1", 
          "#FreshStart: Token:1:6999, Token:1:6998, WaterBottle" 
          ]

