# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: "Difficulty: [c][ffff00]Medium[-][/c] A temperate planet with lush forests, mossy plains, glass sand, and fetid swamps. The Talon have many tribes on this planet."

PlanetClass: Strange Temperate
PlanetType: Strange Temperate
